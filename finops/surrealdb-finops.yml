principles:
  - name: Visibility
    description: >-
      Track SurrealDB Cloud consumption monthly by monitoring compute hours and
      storage growth across all cloud instances.
  - name: Optimization
    description: >-
      Right-size compute tier to match actual workload; pause or downscale
      non-production instances during idle periods; watch for unused storage
      and orphaned backups.
  - name: Accountability
    description: >-
      Tag SurrealDB Cloud instances by team or project to allocate costs;
      review monthly invoices against provisioned tiers and usage patterns.
