        url: https://surrealdb.com/docs/surrealdb/integration/http
  - aid: surrealdb:mcp-server
    name: SurrealDB MCP Server
    description: >-
      SurrealMCP exposes SurrealDB database operations, agent memory, and cloud
      management as structured tool calls over the Model Context Protocol. It
      enables MCP-compatible AI clients such as Claude, Cursor, and VS Code to
      query documents, graphs, vectors, and relational data through a single
      connection without custom integration code.
    humanURL: https://surrealdb.com/mcp
