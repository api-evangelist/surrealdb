apis:
  - aid: surrealdb:http-api
    name: SurrealDB HTTP REST API
    description: >-
      The SurrealDB HTTP REST API provides stateless access to SurrealDB instances
      over standard HTTP. It supports CRUD operations on tables and records,
      SurrealQL query execution via POST /sql, GraphQL queries, authentication
      via JWT and basic auth, data import/export, health and version endpoints,
      and user-defined custom API endpoints via DEFINE API statements.
    humanURL: https://surrealdb.com/docs/surrealdb/integration/http
