---
aid: surrealdb
name: SurrealDB
description: >-
  SurrealDB is a multi-model database that unifies documents, graphs, vectors,
  time-series, full-text search, and relational data within a single ACID
  transaction framework. It exposes a native HTTP REST API and supports SurrealQL,
  a powerful query language designed for multi-model data access. The platform
  includes built-in authentication with JWT tokens, row-level security, and live
  query subscriptions for real-time applications. SurrealDB Cloud provides a
  managed hosting option with usage-based pricing, while the open-source engine
  can be self-hosted. The database also ships a Model Context Protocol (MCP)
  server enabling AI agents and tools such as Claude, Cursor, and VS Code to
  query and manage data directly.
